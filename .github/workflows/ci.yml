name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: gofmt check
        run: |
          fmt=$(gofmt -l .)
          if [ -n "$fmt" ]; then
            echo "Files not gofmt'd:"
            echo "$fmt"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -v -count=1 ./...

      - name: go test -race
        run: go test -race -count=1 ./...

      - name: go mod tidy check
        run: |
          go mod tidy
          if [ -n "$(git diff --exit-code go.mod go.sum)" ]; then
            echo "go.mod or go.sum is not tidy"
            git diff go.mod go.sum
            exit 1
          fi

      - name: Check no direct SSH/SFTP imports
        run: |
          if grep -r "x/crypto/ssh" --include="*.go" . ; then
            echo "ERROR: direct import of x/crypto/ssh detected"
            exit 1
          fi
          if grep -r "pkg/sftp" --include="*.go" . ; then
            echo "ERROR: direct import of pkg/sftp detected"
            exit 1
          fi

      - name: Check ventre-transport dependency
        run: |
          if ! grep -q "github.com/ventre-go/ventre-transport" go.mod; then
            echo "ERROR: ventre-transport not found in go.mod"
            exit 1
          fi
          echo "ventre-transport dependency verified"

  build-gui:
    name: Build GUI (Linux)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install Fyne system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxxf86vm-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev

      - name: Build
        run: go build -o dist/ventre-panel ./cmd/ventre-panel

      - name: Verify binary
        run: |
          file dist/ventre-panel
          test -x dist/ventre-panel
